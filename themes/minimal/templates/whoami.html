{% block content %}

      <div class="terminal" role="region" aria-label="terminal">
        <div class="terminal-bar">
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span class="terminal-dot"></span>
          <span class="terminal-title">karan@karanjakhar.net: ~</span>
        </div>
        <div class="terminal-body">
          <p class="terminal-line"><span class="terminal-prompt">$</span> whoami</p>

      </div>
    </div>
  </section>
{% endblock %}
